<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password - Verify OTP</title>
    {% load static %}
    <link href="{% static 'css/output.css' %}" rel="stylesheet">
</head>
<body>
    <div class="min-h-screen flex items-center justify-center bg-gray-100">
        <div class="bg-white p-8 rounded shadow-md w-full max-w-md">
            <h2 class="text-2xl font-bold mb-2 text-center">Verify OTP</h2>
            <p class="text-gray-500 text-sm text-center mb-6">
                Enter the 4-digit code sent to your phone number.
            </p>

            {% if error %}
                <div class="mb-4 px-4 py-2 rounded text-sm bg-red-100 text-red-700">
                    {{ error }}
                </div>
            {% endif %}

            <form method="POST" action="/forgot-password/verify">
                {% csrf_token %}
                <div class="mb-4">
                    <label for="otp" class="block text-gray-700">OTP Code</label>
                    <input type="text" id="otp" name="otp" required
                           maxlength="4" placeholder="1234"
                           class="w-full px-3 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-green-400 text-center text-xl tracking-widest">
                </div>
                <button type="submit"
                        class="w-full bg-green-500 text-white py-2 rounded hover:bg-green-600 transition-colors">
                    Verify
                </button>
                <p class="text-center mt-4 text-gray-600 text-sm">
                    Didn't receive a code?
                    <a href="/forgot-password" class="text-blue-500 hover:underline">Request a new one</a>
                </p>
            </form>
        </div>
    </div>
</body>
</html>
