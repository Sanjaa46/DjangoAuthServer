<!DOCTYPE html>
<html>
<head>
    <title>SSO Login</title>
    {% load static %}
    <link href="{% static 'css/output.css' %}" rel="stylesheet">
</head>
<body>
    <div class="min-h-screen flex items-center justify-center bg-gray-100">
        <div class="bg-white p-8 rounded shadow-md w-full max-w-md">
            <h2 class="text-2xl font-bold mb-6 text-center">SSO Login</h2>
            {% if messages %}
                {% for message in messages %}
                    <div class="mb-4 px-4 py-2 rounded text-sm
                        {% if message.tags == 'success' %}bg-green-100 text-green-700
                        {% else %}bg-red-100 text-red-700{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
            <form method="POST" action="/login">
                {% csrf_token %}
                <input type="hidden" name="client_id" value="{{ params.client_id }}">
                <input type="hidden" name="redirect_uri" value="{{ params.redirect_uri }}">
                <input type="hidden" name="response_type" value="{{ params.response_type }}">
                <input type="hidden" name="scope" value="{{ params.scope }}">
                <input type="hidden" name="state" value="{{ params.state }}">
                <input type="hidden" name="code_challenge" value="{{ params.code_challenge }}">
                <input type="hidden" name="code_challenge_method" value="{{ params.code_challenge_method }}">

                <div class="mb-4">
                    <label for="phone" class="block text-gray-700">Phone</label>
                    <input type="text" id="phone" name="phone" required class="w-full px-3 py-2 border rounded">
                </div>
                <div class="mb-4">
                    <label for="password" class="block text-gray-700">Password</label>
                    <input type="password" id="password" name="password" required class="w-full px-3 py-2 border rounded">
                </div>
                <div class="text-right mb-4">
                    <a href="/forgot-password" class="text-sm text-blue-500 hover:underline">Forgot password?</a>
                </div>
                <button type="submit" class="w-full bg-green-500 text-white py-2 rounded hover:bg-green-600">Login</button>
                <p class="text-center mt-2.5 text-gray-600">
                    Don't have an account? 
                    <a href="/signup" class="text-blue-500 hover:underline">Sign Up</a>
                </p>
            </form>
        </div>
    </div>

</body>
</html>
